# pythran configuration shipped with ec-tools, applied (via $PYTHRANRC, set in
# ec_tools/__init__.py) only when the pip "pythran" extra installed scipy-openblas64.
# It tells pythran to link that bundled OpenBLAS, so BLAS-backed numpy routines
# (np.convolve in the Riemann semi-integration core) compile without a system BLAS.
# Only the blas setting is overridden; all other pythran defaults still apply.
[compiler]
blas=scipy-openblas
